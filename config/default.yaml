teacher:
  model: resnet50
  pretrained: true
  cifar_stem: true
  finetune_epochs: 20
  finetune_lr: 0.01
  weights_path: outputs/teacher_finetuned.pt

profiling:
  num_calibration_samples: 5000
  variance_threshold: 0.95
  histogram_bins: 64
  covariance_mode: per_pixel
  spatial_subsample: 2              # NEW: keep every k-th pixel per image to
                                    # mitigate per-pixel correlation inflating
                                    # the top eigenvalues; 1 disables.
  rank_definition: variance

student:
  blocks_per_stage: 2
  min_width: 16
  width_multiple: 8
  block_type: bottleneck
  stem_type: cifar                  # "cifar" | "imagenet"

training:
  epochs: 200
  batch_size: 128
  lr: 0.1
  weight_decay: 5.0e-4
  momentum: 0.9
  lr_schedule: cosine
  lr_warmup_epochs: 2               # linear LR ramp for first N epochs
  loss_alpha: 1.0
  loss_beta: 0.5
  loss_gamma: 0.3
  loss_delta: 1.0
  gamma_warmup_epochs: 10
  beta_warmup_epochs: 3

  subspace_mode: spatial            # "spatial" | "gap" | "cosine_spatial"
  sv_weighting: sqrt
  subspace_normalize_features: false
  subspace_stage_aggregation: last  # NEW: "last" | "max_rank" | "average" —
                                    # "average" uses every profiled block in a
                                    # stage instead of discarding all but one.
  sparsity_ratio_loss: bce
  sparsity_adaptive_tau: true
  use_logit_kd: true
  logit_temperature: 4.0            # v2 default for CIFAR-10 should try 2.0
  combination: fixed
  auto_normalize: false
  auto_norm_momentum: 0.95
  projector_init: orthogonal
  projector_use_bn: false           # NEW: BN on the projector output was
                                    # rescaling features independently of
                                    # teacher magnitudes and fighting the
                                    # subspace MSE; off by default.
  projector_freeze: false
  keep_best: true
  restore_best_on_exit: true        # NEW: at end of training, load the
                                    # best-val snapshot so the returned
                                    # student actually matches the logged
                                    # best accuracy.

data:
  dataset: cifar10
  data_dir: ./data
  num_workers: 4
  augmentation: standard
